name: validate

# 在 GitHub 的機器上用 Gazebo Harmonic 驗證遷移後的模型/世界,
# 本機(尤其 CPU 吃緊時)不必自己跑。

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ── 第一道關:輕量靜態驗證(快、穩、不需渲染)──
  sdf-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 版本
        run: gz sim --version

      - name: SDF 靜態驗證(scripts/validate.sh)
        run: bash scripts/validate.sh

  # ── 第二道關:headless 真正載入 world(唯一能解析 model:// 的方式)──
  # 已在 Harmonic 上實測通過(model:// 全解析、無致命錯),設為必過 gate。
  headless-load:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic + xvfb
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg xvfb
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: headless 載入 small_warehouse(server-only,跑 300 步後退出)
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models"
          export LIBGL_ALWAYS_SOFTWARE=true
          set -o pipefail
          # gz sim 會用 GZ_SIM_RESOURCE_PATH 解析 model://;能載入代表 include 都接得上
          xvfb-run -a gz sim -s -r --iterations 300 worlds/small_warehouse.sdf 2>&1 | tee load.log || true
          echo "---- 檢查 log 是否有致命錯 ----"
          if grep -E 'Unable to find uri|Error Code|Failed to load' load.log; then
            echo "::error::world headless 載入有錯(見上)"; exit 1
          fi
          echo "✅ headless 載入無致命錯"

      - name: 保留 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-log
          path: load.log

  # ── 成果圖:headless 渲染倉庫俯視圖,輸出成 artifact(供教學文使用)──
  # 軟體渲染在 CI 上較不穩,先設 continue-on-error 不擋整體;成功就有圖。
  render:
    runs-on: ubuntu-24.04
    needs: sdf-validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic + 軟體渲染依賴
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg \
            libgl1-mesa-dri libegl1 libegl-mesa0 libglx-mesa0 mesa-utils
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 診斷 GL/EGL 環境
        run: |
          echo "== glxinfo =="; glxinfo -B 2>&1 | head -8 || true
          echo "== eglinfo =="; eglinfo 2>&1 | head -25 || true

      - name: 渲染靜態成果圖(EGL surfaceless;軟體渲染慢,給足 wall-clock)
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models:$PWD/robot"
          export LIBGL_ALWAYS_SOFTWARE=true
          render_one () {  # $1=world $2=存檔dir $3=輸出png $4=等待秒數
            rm -rf "$2" && mkdir -p "$2"
            gz sim -s -r --headless-rendering "$1" > /tmp/g.log 2>&1 &
            local PID=$!
            sleep "$4"
            echo "[$1] ${4}s 內影格數 = $(ls "$2"/*.png 2>/dev/null | wc -l)"
            kill -INT "$PID" 2>/dev/null || true; sleep 2
            local f; f="$(ls -1 "$2"/*.png 2>/dev/null | tail -1)"
            if [ -n "$f" ]; then cp "$f" "$3"; echo "✅ $3 <- $f ($(du -h "$3"|cut -f1))"; else echo "::warning::$1 無影格"; fi
          }
          # 叉車場景(boxes,快):~26s;倉庫場景(14 個貼圖模型,慢):~70s
          render_one worlds/forklift_video.sdf      /tmp/frames           forklift-overview.png   26
          render_one worlds/screenshot_warehouse.sdf /tmp/warehouse_render warehouse-overview.png  72
          echo "== 產出 =="; ls -la *.png 2>/dev/null || echo "(無)"

      - name: 上傳成果圖
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overview-stills
          path: |
            warehouse-overview.png
            forklift-overview.png

  # ── 錄影:叉車移動的 mp4(EGL headless 渲染相機影格 → ffmpeg)──
  video:
    runs-on: ubuntu-24.04
    needs: sdf-validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic + ffmpeg + 軟體渲染依賴
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg ffmpeg \
            libgl1-mesa-dri libegl1 libegl-mesa0 libglx-mesa0 mesa-utils
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 錄叉車移動(EGL headless 相機影格 → mp4)
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models:$PWD/robot"
          export LIBGL_ALWAYS_SOFTWARE=true
          rm -rf /tmp/frames && mkdir -p /tmp/frames
          # 背景跑(才能同時下指令);用 stdbuf 行緩衝避免 log 被吞,SIGINT 優雅停讓影格 flush
          stdbuf -oL -eL gz sim -s -r --headless-rendering worlds/forklift_video.sdf > video.log 2>&1 &
          PID=$!
          sleep 4
          gz topic -t /forklift/traction -m gz.msgs.Double -p 'data: 6.0' || true
          gz topic -t /forklift/steer    -m gz.msgs.Double -p 'data: 0.2' || true
          sleep 13
          kill -INT "$PID" 2>/dev/null || true
          sleep 4   # 讓它 flush 影格與 log
          echo "---- 影格數 ----"; ls /tmp/frames 2>/dev/null | wc -l
          n=$(ls /tmp/frames/*.png 2>/dev/null | wc -l)
          if [ "$n" -lt 5 ]; then echo "::warning::影格太少($n),看 video.log artifact"; tail -30 video.log || true; exit 0; fi
          ffmpeg -y -framerate 10 -pattern_type glob -i '/tmp/frames/*.png' \
            -c:v libx264 -pix_fmt yuv420p forklift.mp4
          cp "$(ls -1 /tmp/frames/*.png | tail -1)" forklift-still.png
          echo "影片 $(du -h forklift.mp4 | cut -f1),影格 $n"

      - name: 上傳影片 + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forklift-video
          path: |
            forklift.mp4
            forklift-still.png
            video.log

  # ── 叉車「會動」測試:純物理(無渲染),下舵輪+轉向指令,檢查位姿有變 ──
  # 已在 Harmonic 實測通過(位移 ~0.56m),設為必過 gate。
  forklift-move:
    runs-on: ubuntu-24.04
    needs: sdf-validate
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 載入叉車、下指令、比對位姿
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models:$PWD/robot"
          # server-only、即時跑(無感測器→不需渲染),背景執行
          gz sim -s -r worlds/forklift_test.sdf > sim.log 2>&1 &
          SIMPID=$!
          sleep 4
          echo "=== 起始位姿 ==="; gz topic -e -t /model/forklift/pose -n 1 | tee pose_before.txt || true
          # 舵輪驅動(rad/s)+ 轉向(rad)
          gz topic -t /forklift/traction -m gz.msgs.Double -p 'data: 8.0' || true
          gz topic -t /forklift/steer    -m gz.msgs.Double -p 'data: 0.25' || true
          sleep 7
          echo "=== 結束位姿 ==="; gz topic -e -t /model/forklift/pose -n 1 | tee pose_after.txt || true
          kill "$SIMPID" 2>/dev/null || true
          python3 scripts/check_moved.py pose_before.txt pose_after.txt

      - name: 保留 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forklift-move-logs
          path: |
            sim.log
            pose_before.txt
            pose_after.txt
