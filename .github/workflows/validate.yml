name: validate

# 在 GitHub 的機器上用 Gazebo Harmonic 驗證遷移後的模型/世界,
# 本機(尤其 CPU 吃緊時)不必自己跑。

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ── 第一道關:輕量靜態驗證(快、穩、不需渲染)──
  sdf-validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 版本
        run: gz sim --version

      - name: SDF 靜態驗證(scripts/validate.sh)
        run: bash scripts/validate.sh

  # ── 第二道關:headless 真正載入 world(唯一能解析 model:// 的方式)──
  # 已在 Harmonic 上實測通過(model:// 全解析、無致命錯),設為必過 gate。
  headless-load:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic + xvfb
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg xvfb
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: headless 載入 small_warehouse(server-only,跑 300 步後退出)
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models"
          export LIBGL_ALWAYS_SOFTWARE=true
          set -o pipefail
          # gz sim 會用 GZ_SIM_RESOURCE_PATH 解析 model://;能載入代表 include 都接得上
          xvfb-run -a gz sim -s -r --iterations 300 worlds/small_warehouse.sdf 2>&1 | tee load.log || true
          echo "---- 檢查 log 是否有致命錯 ----"
          if grep -E 'Unable to find uri|Error Code|Failed to load' load.log; then
            echo "::error::world headless 載入有錯(見上)"; exit 1
          fi
          echo "✅ headless 載入無致命錯"

      - name: 保留 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-log
          path: load.log

  # ── 成果圖:headless 渲染倉庫俯視圖,輸出成 artifact(供教學文使用)──
  # 軟體渲染在 CI 上較不穩,先設 continue-on-error 不擋整體;成功就有圖。
  render:
    runs-on: ubuntu-24.04
    needs: sdf-validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic + xvfb
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg xvfb
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 渲染倉庫俯視圖(screenshot_warehouse.sdf 內的相機 save 出 PNG)
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models"
          export LIBGL_ALWAYS_SOFTWARE=true
          rm -rf /tmp/warehouse_render && mkdir -p /tmp/warehouse_render
          # 跑一段讓相機 sensor 渲染並存檔;取最後一張(避免前幾張場景還沒載完)
          # 給 xvfb 足夠色深(24-bit),否則 ogre2 建不出 GL context、相機不會渲染
          xvfb-run -a --server-args="-screen 0 1600x1200x24" gz sim -s -r --iterations 1500 worlds/screenshot_warehouse.sdf 2>&1 | tee render.log || true
          echo "---- 存出的影格 ----"; ls -la /tmp/warehouse_render || true
          last="$(ls -1 /tmp/warehouse_render/*.png 2>/dev/null | tail -1)"
          if [ -z "$last" ]; then echo "::error::沒有渲染出任何 PNG"; tail -40 render.log; exit 1; fi
          cp "$last" warehouse-overview.png
          echo "成果圖:$last -> warehouse-overview.png ($(du -h warehouse-overview.png | cut -f1))"

      - name: 上傳成果圖
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-overview
          path: warehouse-overview.png

  # ── 叉車「會動」測試:純物理(無渲染),下舵輪+轉向指令,檢查位姿有變 ──
  # 先 continue-on-error(未實測過 gz topic 行為);綠了再考慮升必過。
  forklift-move:
    runs-on: ubuntu-24.04
    needs: sdf-validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Gazebo Harmonic
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: 載入叉車、下指令、比對位姿
        run: |
          export GZ_SIM_RESOURCE_PATH="$PWD/models:$PWD/robot"
          # server-only、即時跑(無感測器→不需渲染),背景執行
          gz sim -s -r worlds/forklift_test.sdf > sim.log 2>&1 &
          SIMPID=$!
          sleep 4
          echo "=== 起始位姿 ==="; gz topic -e -t /model/forklift/pose -n 1 | tee pose_before.txt || true
          # 舵輪驅動(rad/s)+ 轉向(rad)
          gz topic -t /forklift/traction -m gz.msgs.Double -p 'data: 8.0' || true
          gz topic -t /forklift/steer    -m gz.msgs.Double -p 'data: 0.25' || true
          sleep 7
          echo "=== 結束位姿 ==="; gz topic -e -t /model/forklift/pose -n 1 | tee pose_after.txt || true
          kill "$SIMPID" 2>/dev/null || true
          python3 scripts/check_moved.py pose_before.txt pose_after.txt

      - name: 保留 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forklift-move-logs
          path: |
            sim.log
            pose_before.txt
            pose_after.txt
